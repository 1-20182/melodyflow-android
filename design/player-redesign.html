<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沉浸式音乐播放器</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #090909;
            color: #FFFFFF;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #root {
            width: 100%;
            height: 100%;
        }

        /* 背景光晕效果 */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .ambient-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            animation: pulse 8s ease-in-out infinite;
        }

        .ambient-glow-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #1DB954 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 0s;
        }

        .ambient-glow-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #1DB954 0%, transparent 70%);
            top: 20%;
            left: 20%;
            animation-delay: -2s;
        }

        .ambient-glow-3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #169c45 0%, transparent 70%);
            bottom: 20%;
            right: 20%;
            animation-delay: -4s;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.12; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.18; }
        }

        /* 主容器 */
        .player-container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            padding: 60px 80px;
            gap: 60px;
        }

        /* 左侧控制区 */
        .left-section {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            width: 80px;
            padding: 20px 0;
        }

        .side-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #B3B3B3;
        }

        .side-btn:hover {
            background: rgba(29, 185, 84, 0.15);
            border-color: rgba(29, 185, 84, 0.3);
            color: #1DB954;
            transform: scale(1.05);
        }

        .side-btn.active {
            background: rgba(29, 185, 84, 0.2);
            color: #1DB954;
        }

        /* 中央唱片区 */
        .center-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 50px;
        }

        .vinyl-container {
            position: relative;
            width: 480px;
            height: 480px;
        }

        .vinyl-shadow {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.6) 0%, transparent 70%);
            filter: blur(30px);
            z-index: 0;
        }

        .vinyl {
            position: relative;
            width: 480px;
            height: 480px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.05),
                inset 0 0 60px rgba(0, 0, 0, 0.4);
            z-index: 1;
            animation: rotate 20s linear infinite;
            animation-play-state: paused;
        }

        .vinyl.playing {
            animation-play-state: running;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .vinyl-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .vinyl-grooves {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: #090909;
            box-shadow: 
                0 0 0 2px rgba(255, 255, 255, 0.03),
                0 0 0 8px rgba(255, 255, 255, 0.02),
                0 0 0 14px rgba(255, 255, 255, 0.015),
                0 0 0 20px rgba(255, 255, 255, 0.01);
            z-index: 2;
        }

        .vinyl-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #1DB954;
            z-index: 3;
            box-shadow: 0 2px 10px rgba(29, 185, 84, 0.4);
        }

        /* 歌曲信息 */
        .track-info {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .track-title {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #FFFFFF 0%, #E0E0E0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .track-artist {
            font-size: 20px;
            color: #B3B3B3;
            font-weight: 400;
        }

        /* 右侧控制区 */
        .right-section {
            width: 380px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 50px;
        }

        /* 玻璃拟态卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 32px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* 播放控制 */
        .controls-section {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .control-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }

        .control-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            color: #FFFFFF;
            background: transparent;
            border: none;
        }

        .control-btn:hover {
            transform: scale(1.1);
            color: #1DB954;
        }

        .control-btn.secondary {
            width: 48px;
            height: 48px;
            opacity: 0.7;
        }

        .control-btn.secondary:hover {
            opacity: 1;
        }

        .control-btn.primary {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1DB954 0%, #1ed760 100%);
            color: #000000;
            box-shadow: 0 8px 30px rgba(29, 185, 84, 0.4);
        }

        .control-btn.primary:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 40px rgba(29, 185, 84, 0.5);
        }

        /* 进度条 */
        .progress-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .progress-bar-container {
            position: relative;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            cursor: pointer;
            overflow: visible;
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(90deg, #1DB954 0%, #1ed760 100%);
            border-radius: 3px;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px rgba(29, 185, 84, 0.5);
        }

        .progress-handle {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            background: #FFFFFF;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            cursor: grab;
        }

        .progress-bar-container:hover .progress-handle {
            opacity: 1;
        }

        .progress-handle:active {
            cursor: grabbing;
            transform: translate(-50%, -50%) scale(1.2);
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #B3B3B3;
            font-variant-numeric: tabular-nums;
        }

        /* 播放列表 */
        .playlist-section h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #FFFFFF;
            letter-spacing: 0.5px;
        }

        .playlist {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
        }

        .playlist-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .playlist-item.active {
            background: rgba(29, 185, 84, 0.15);
            border: 1px solid rgba(29, 185, 84, 0.2);
        }

        .playlist-item-number {
            width: 24px;
            text-align: center;
            font-size: 14px;
            color: #B3B3B3;
            font-variant-numeric: tabular-nums;
        }

        .playlist-item.active .playlist-item-number {
            color: #1DB954;
        }

        .playlist-item-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .playlist-item-title {
            font-size: 14px;
            font-weight: 500;
            color: #FFFFFF;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .playlist-item.active .playlist-item-title {
            color: #1DB954;
        }

        .playlist-item-artist {
            font-size: 12px;
            color: #B3B3B3;
        }

        .playlist-item-duration {
            font-size: 13px;
            color: #B3B3B3;
            font-variant-numeric: tabular-nums;
        }

        /* 音量控制 */
        .volume-section {
            display: flex;
            align-items: center;
            gap: 16px;
            padding-top: 8px;
        }

        .volume-slider {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .volume-level {
            height: 100%;
            background: #1DB954;
            border-radius: 2px;
            width: 70%;
        }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        .animate-delay-1 { animation-delay: 0.1s; }
        .animate-delay-2 { animation-delay: 0.2s; }
        .animate-delay-3 { animation-delay: 0.3s; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // SVG 图标组件
        const Icons = {
            ChevronLeft: () => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="m15 18-6-6 6-6"/>
                </svg>
            ),
            Heart: () => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                </svg>
            ),
            HeartFilled: () => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                </svg>
            ),
            SkipBack: () => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="19 20 9 12 19 4 19 20"/>
                    <line x1="5" y1="19" x2="5" y2="5"/>
                </svg>
            ),
            SkipForward: () => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="5 4 15 12 5 20 5 4"/>
                    <line x1="19" y1="5" x2="19" y2="19"/>
                </svg>
            ),
            Play: () => (
                <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
            ),
            Pause: () => (
                <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                    <rect x="6" y="4" width="4" height="16"/>
                    <rect x="14" y="4" width="4" height="16"/>
                </svg>
            ),
            Repeat: () => (
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="m17 2 4 4-4 4"/>
                    <path d="M3 11v-1a4 4 0 0 1 4-4h14"/>
                    <path d="m7 22-4-4 4-4"/>
                    <path d="M21 13v1a4 4 0 0 1-4 4H3"/>
                </svg>
            ),
            Shuffle: () => (
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="m18 14 4 4-4 4"/>
                    <path d="m18 2 4 4-4 4"/>
                    <path d="M2 18h1.973a4 4 0 0 0 3.3-1.7l5.454-8.6a4 4 0 0 1 3.3-1.7H22"/>
                    <path d="M2 6h1.972a4 4 0 0 1 3.6 2.2"/>
                    <path d="M22 18h-6.041a4 4 0 0 1-3.3-1.8l-.359-.45"/>
                </svg>
            ),
            Volume2: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                </svg>
            ),
            ListMusic: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M16 6H3"/>
                    <path d="M11 12H3"/>
                    <path d="M16 18H3"/>
                    <path d="M21 12v6"/>
                    <path d="M21 6v.01"/>
                </svg>
            )
        };

        const playlistData = [
            { id: 1, title: "Midnight City", artist: "M83", duration: "4:03" },
            { id: 2, title: "Blinding Lights", artist: "The Weeknd", duration: "3:20" },
            { id: 3, title: "Levitating", artist: "Dua Lipa", duration: "3:23" },
            { id: 4, title: "Heat Waves", artist: "Glass Animals", duration: "3:58" },
        ];

        function MusicPlayer() {
            const [isPlaying, setIsPlaying] = useState(false);
            const [isLiked, setIsLiked] = useState(false);
            const [currentTrack, setCurrentTrack] = useState(0);
            const [progress, setProgress] = useState(35);
            const [isDragging, setIsDragging] = useState(false);
            const progressRef = useRef(null);

            const currentSong = playlistData[currentTrack];

            // 格式化时间
            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            const currentTime = formatTime((progress / 100) * 243);
            const totalTime = "4:03";

            // 处理进度条点击
            const handleProgressClick = (e) => {
                const rect = progressRef.current.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const newProgress = (x / rect.width) * 100;
                setProgress(Math.max(0, Math.min(100, newProgress)));
            };

            // 处理拖拽
            useEffect(() => {
                const handleMouseMove = (e) => {
                    if (!isDragging) return;
                    const rect = progressRef.current.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const newProgress = (x / rect.width) * 100;
                    setProgress(Math.max(0, Math.min(100, newProgress)));
                };

                const handleMouseUp = () => {
                    setIsDragging(false);
                };

                if (isDragging) {
                    document.addEventListener('mousemove', handleMouseMove);
                    document.addEventListener('mouseup', handleMouseUp);
                }

                return () => {
                    document.removeEventListener('mousemove', handleMouseMove);
                    document.removeEventListener('mouseup', handleMouseUp);
                };
            }, [isDragging]);

            // 自动播放进度
            useEffect(() => {
                let interval;
                if (isPlaying && !isDragging) {
                    interval = setInterval(() => {
                        setProgress(prev => {
                            if (prev >= 100) {
                                setIsPlaying(false);
                                return 0;
                            }
                            return prev + 0.1;
                        });
                    }, 100);
                }
                return () => clearInterval(interval);
            }, [isPlaying, isDragging]);

            return (
                <>
                    {/* 背景光晕 */}
                    <div className="ambient-bg">
                        <div className="ambient-glow ambient-glow-1"></div>
                        <div className="ambient-glow ambient-glow-2"></div>
                        <div className="ambient-glow ambient-glow-3"></div>
                    </div>

                    {/* 主播放器 */}
                    <div className="player-container">
                        {/* 左侧按钮 */}
                        <div className="left-section animate-in">
                            <button className="side-btn">
                                <Icons.ChevronLeft />
                            </button>
                            <button 
                                className={`side-btn ${isLiked ? 'active' : ''}`}
                                onClick={() => setIsLiked(!isLiked)}
                            >
                                {isLiked ? <Icons.HeartFilled /> : <Icons.Heart />}
                            </button>
                        </div>

                        {/* 中央唱片区 */}
                        <div className="center-section">
                            <div className="vinyl-container animate-in animate-delay-1">
                                <div className="vinyl-shadow"></div>
                                <div className={`vinyl ${isPlaying ? 'playing' : ''}`}>
                                    <img 
                                        src={`https://picsum.photos/seed/music${currentTrack}/480/480`}
                                        alt="Album Cover"
                                        className="vinyl-image"
                                    />
                                    <div className="vinyl-grooves"></div>
                                    <div className="vinyl-center"></div>
                                </div>
                            </div>

                            <div className="track-info animate-in animate-delay-2">
                                <h1 className="track-title">{currentSong.title}</h1>
                                <p className="track-artist">{currentSong.artist}</p>
                            </div>
                        </div>

                        {/* 右侧控制区 */}
                        <div className="right-section animate-in animate-delay-3">
                            {/* 播放控制 */}
                            <div className="glass-card controls-section">
                                <div className="control-buttons">
                                    <button className="control-btn secondary">
                                        <Icons.Shuffle />
                                    </button>
                                    <button 
                                        className="control-btn secondary"
                                        onClick={() => setCurrentTrack(prev => prev > 0 ? prev - 1 : playlistData.length - 1)}
                                    >
                                        <Icons.SkipBack />
                                    </button>
                                    <button 
                                        className="control-btn primary"
                                        onClick={() => setIsPlaying(!isPlaying)}
                                    >
                                        {isPlaying ? <Icons.Pause /> : <Icons.Play />}
                                    </button>
                                    <button 
                                        className="control-btn secondary"
                                        onClick={() => setCurrentTrack(prev => prev < playlistData.length - 1 ? prev + 1 : 0)}
                                    >
                                        <Icons.SkipForward />
                                    </button>
                                    <button className="control-btn secondary">
                                        <Icons.Repeat />
                                    </button>
                                </div>

                                {/* 进度条 */}
                                <div className="progress-section">
                                    <div 
                                        className="progress-bar-container"
                                        ref={progressRef}
                                        onClick={handleProgressClick}
                                    >
                                        <div 
                                            className="progress-bar" 
                                            style={{ width: `${progress}%` }}
                                        ></div>
                                        <div 
                                            className="progress-handle"
                                            style={{ left: `${progress}%` }}
                                            onMouseDown={() => setIsDragging(true)}
                                        ></div>
                                    </div>
                                    <div className="time-display">
                                        <span>{currentTime}</span>
                                        <span>{totalTime}</span>
                                    </div>
                                </div>

                                {/* 音量控制 */}
                                <div className="volume-section">
                                    <Icons.Volume2 />
                                    <div className="volume-slider">
                                        <div className="volume-level"></div>
                                    </div>
                                </div>
                            </div>

                            {/* 播放列表 */}
                            <div className="glass-card playlist-section">
                                <h3><Icons.ListMusic /> 播放队列</h3>
                                <div className="playlist">
                                    {playlistData.map((track, index) => (
                                        <div 
                                            key={track.id}
                                            className={`playlist-item ${index === currentTrack ? 'active' : ''}`}
                                            onClick={() => setCurrentTrack(index)}
                                        >
                                            <span className="playlist-item-number">
                                                {index === currentTrack && isPlaying ? '♪' : index + 1}
                                            </span>
                                            <div className="playlist-item-info">
                                                <span className="playlist-item-title">{track.title}</span>
                                                <span className="playlist-item-artist">{track.artist}</span>
                                            </div>
                                            <span className="playlist-item-duration">{track.duration}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MusicPlayer />);
    </script>
</body>
</html>
